  }).then(function(data) {
    return data.content.filter(function(b) { return b.type === 'text'; }).map(function(b) { return b.text; }).join('\n');

}

function parseJSON(text) {

  var depth = 0, start = -1;
  for (var i = 0; i < text.length; i++) {
    if (text[i] === '{') { if (depth === 0) start = i; depth++; }
    else if (text[i] === '}') { depth--; if (depth === 0 && start !== -1) { attempts.push(text.slice(start, i + 1)); start = -1; } }
  }
  for (var j = 0; j < attempts.length; j++) {
    try { var p = JSON.parse(attempts[j]); if (p && typeof p === 'object') return p; } catch(e) {}
  }
  return null;
}
